openapi: 3.0.0
info:
  title: Game of Thrones Quotes API
  version: 1.0.0
  description: API documentation for the current Game of Thrones quotes, characters, houses, authentication, and game routes.

servers:
  - url: /
    description: Current server

tags:
  - name: Quotes
    description: Quote listing, filtering, creation, update, and deletion
  - name: Characters
    description: Character listing
  - name: Houses
    description: House listing
  - name: Authentication
    description: User registration and login
  - name: Game
    description: Protected game session endpoints

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    House:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        photo:
          type: string

    Character:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        house:
          oneOf:
            - type: string
              nullable: true
            - $ref: '#/components/schemas/House'
        photo:
          type: string

    Quote:
      type: object
      properties:
        _id:
          type: string
        sentence:
          type: string
        character:
          $ref: '#/components/schemas/Character'
        season:
          type: integer
          nullable: true
        popularity:
          type: integer
          minimum: 1
          maximum: 5
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    QuoteInput:
      type: object
      required:
        - sentence
        - character
      properties:
        sentence:
          type: string
        character:
          type: string
          description: Character ID/slug
        season:
          type: integer
        popularity:
          type: integer
          minimum: 1
          maximum: 5

    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
        count:
          type: integer
        pagination:
          type: object
          properties:
            totalItems:
              type: integer
            currentPage:
              type: integer
            totalPages:
              type: integer
        data:
          type: array
          items:
            type: object

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    GoogleLoginRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Google OAuth token from the client

    UserPublic:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        coins:
          type: integer
        xp:
          type: integer
        currentLevel:
          type: integer
        highestStreak:
          type: integer

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserPublic'

    StartGameRequest:
      type: object
      properties:
        difficulty:
          type: string
          enum:
            - easy
            - medium
            - hard

    SubmitAnswerRequest:
      type: object
      required:
        - sessionId
        - answers
      properties:
        sessionId:
          type: string
        answers:
          type: array
          items:
            type: string

    PowerUpRequest:
      type: object
      required:
        - sessionId
        - powerUpType
      properties:
        sessionId:
          type: string
        powerUpType:
          type: string
          enum:
            - reveal_letter
            - skip_quote
            - buy_heart

    EndGameRequest:
      type: object
      required:
        - sessionId
      properties:
        sessionId:
          type: string

paths:
  /api/quotes:
    get:
      tags:
        - Quotes
      summary: List quotes
      description: Returns a paginated list of quotes. Supports filtering by character, house, and season.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: characterId
          schema:
            type: string
        - in: query
          name: houseId
          schema:
            type: string
        - in: query
          name: season
          schema:
            type: integer
      responses:
        '200':
          description: Paginated quote list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags:
        - Quotes
      summary: Create a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteInput'
      responses:
        '201':
          description: Quote created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Quote'

  /api/quotes/{id}:
    put:
      tags:
        - Quotes
      summary: Update a quote
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteInput'
      responses:
        '200':
          description: Quote updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Quote'
        '404':
          description: Quote not found
    delete:
      tags:
        - Quotes
      summary: Delete a quote
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quote deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '404':
          description: Quote not found

  /api/quotes/filter:
    get:
      tags:
        - Quotes
      summary: Get one random quote matching filters
      description: Returns a single quote selected randomly from the filtered set.
      parameters:
        - in: query
          name: characterId
          schema:
            type: string
        - in: query
          name: houseId
          schema:
            type: string
        - in: query
          name: season
          schema:
            type: integer
      responses:
        '200':
          description: Matching quote returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Quote'
        '404':
          description: No quotes found

  /api/quotes/random:
    get:
      tags:
        - Quotes
      summary: Get a completely random quote
      responses:
        '200':
          description: Random quote returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Quote'
        '404':
          description: No quotes found

  /api/characters:
    get:
      tags:
        - Characters
      summary: List characters
      description: Returns a paginated list of characters with populated house data.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated character list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  /api/houses:
    get:
      tags:
        - Houses
      summary: List houses
      description: Returns a paginated list of houses.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated house list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation or duplicate-user error
        '500':
          description: Server error during registration

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Log in an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing credentials
        '401':
          description: Invalid credentials
        '500':
          description: Server error during login

  /api/auth/google:
    post:
      tags:
        - Authentication
      summary: Log in using Google OAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
      responses:
        '200':
          description: Google login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid or missing token
        '401':
          description: Token verification failed
        '500':
          description: Server error during Google login

  /api/game/start:
    post:
      tags:
        - Game
      summary: Start a new game session
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartGameRequest'
      responses:
        '201':
          description: Game session started
        '400':
          description: Not enough quotes available for the requested difficulty
        '401':
          description: Authentication required

  /api/game/answer:
    post:
      tags:
        - Game
      summary: Submit answers for the current quote
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '200':
          description: Answer processed
        '404':
          description: Active game session not found
        '401':
          description: Authentication required

  /api/game/powerup:
    post:
      tags:
        - Game
      summary: Use a power-up during an active session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PowerUpRequest'
      responses:
        '200':
          description: Power-up applied
        '400':
          description: Insufficient funds or invalid power-up
        '404':
          description: Active game session not found
        '401':
          description: Authentication required

  /api/game/end:
    post:
      tags:
        - Game
      summary: End the current game session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndGameRequest'
      responses:
        '200':
          description: Game session ended
        '404':
          description: Session not found
        '401':
          description: Authentication required
